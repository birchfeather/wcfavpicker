name: Deploy to Neocities

on:
  push:
    branches:
      - main # Change to 'master' if your default branch is named master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Neocities
      uses: bcomnes/deploy-to-neocities@v3
      with:
        api_token: ${{ secrets.NEOCITIES_API_TOKEN }}
        cleanup: true # Setting to true deletes files on Neocities that you removed from GitHub
        dist_dir: public # The folder containing your production HTML/CSS/JS files
